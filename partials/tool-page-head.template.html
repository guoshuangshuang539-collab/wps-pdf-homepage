<!DOCTYPE html>
<!--
================================================================================
pdf.wps.com 工具内页 <head> 模板（SEO + GEO + i18n）
对接说明：研发按变量注入渲染；运营/SEO 只维护 DIFF 文案配置表。

图例：
  [SHARED]  全站工具内页统一，写死或读站点级配置，禁止按工具改
  [DIFF]    每个工具（及每个 locale）必须单独配置
  [SEMI]    结构统一，部分字段随工具变化（见注释）

URL 规范：
  PDF： https://pdf.wps.com/{locale}/pdf-tools/{toolSlug}/
  3D ： https://pdf.wps.com/{locale}/3d-conversion/{hubSlug}/

变量约定（camelCase = CMS / i18n 配置字段）：
  locale          BCP 47，如 en-US
  localeOg        Open Graph locale，下划线，如 en_US
  section          URL 路径段：pdf-tools | 3d-conversion（仅用于 URL，非面包屑）
  toolSlug        如 compress-pdf | mesh-converter
  toolName        短名，如 "Compress PDF"；面包屑为 Home › {toolName}
  pageTitle       <title> 全文
  metaDescription description / og:description 基础文案
  h1              与可见 H1 一致（未必等于 pageTitle）
  canonicalUrl    本页绝对 URL（自引用）
  ogImageUrl      1200x630 绝对 URL
  ogImageAlt      配图 alt
  aboutTopic      WebPage.about，如 "PDF compression"
  howtoName       HowTo.name
  howtoSteps[]    { name, text } × N，须与页内步骤一致
  faqItems[]      { question, answer } × N，须与页内 FAQ 一致
  aggregateRating 可选；无真实评论数据时不要伪造
================================================================================
-->
<html lang="{{locale}}"><!-- [DIFF] locale -->
<head>

  <!-- ========== 1. HTML 基础 — 全部 [SHARED] ========== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="https://pdf.wps.com/favicon.ico" />
  <link rel="apple-touch-icon" href="https://pdf.wps.com/apple-touch-icon.png" />

  <!-- ========== 2. SEO 元数据 ========== -->
  <!-- [DIFF] pageTitle：建议 50–60 字符；核心词靠前；结尾统一品牌 -->
  <title>{{pageTitle}}</title>

  <!-- [DIFF] metaDescription：120–160 字符；含主关键词 + 免费/在线/结果收益 -->
  <meta name="description" content="{{metaDescription}}" />

  <!-- [SHARED] -->
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
  <meta name="author" content="WPS Office" />
  <meta name="publisher" content="WPS Office" />
  <!-- [SHARED] 不输出 keywords（Google/Bing 基本忽略） -->

  <!-- [DIFF] canonicalUrl = https://pdf.wps.com/{locale}/{section}/{toolSlug}/ -->
  <link rel="canonical" href="{{canonicalUrl}}" />

  <!-- ========== 3. International — 结构 [SHARED]，href 路径 [DIFF] ========== -->
  <!--
    规则（全部语言页必须互相引用）：
    1. 每个页面 hreflang 集合必须包含自身
    2. 必须含 x-default → en-US 同工具页
    3. 仅 path 中 {locale} 变化；{section}/{toolSlug} 全语言共用英文 slug
    实现：用 locale 列表循环生成，禁止手写漏项
  -->
  <link rel="alternate" hreflang="x-default" href="https://pdf.wps.com/en-US/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="en-US" href="https://pdf.wps.com/en-US/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="es-ES" href="https://pdf.wps.com/es-ES/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="pt-BR" href="https://pdf.wps.com/pt-BR/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="ru-RU" href="https://pdf.wps.com/ru-RU/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="fr-FR" href="https://pdf.wps.com/fr-FR/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="de-DE" href="https://pdf.wps.com/de-DE/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="it-IT" href="https://pdf.wps.com/it-IT/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="id-ID" href="https://pdf.wps.com/id-ID/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="vi-VN" href="https://pdf.wps.com/vi-VN/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="th-TH" href="https://pdf.wps.com/th-TH/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="pl-PL" href="https://pdf.wps.com/pl-PL/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="zh-Hant" href="https://pdf.wps.com/zh-Hant/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="ar-SA" href="https://pdf.wps.com/ar-SA/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="tr-TR" href="https://pdf.wps.com/tr-TR/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="ko-KR" href="https://pdf.wps.com/ko-KR/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="uk-UA" href="https://pdf.wps.com/uk-UA/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="ro-RO" href="https://pdf.wps.com/ro-RO/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="nl-NL" href="https://pdf.wps.com/nl-NL/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="sr-RS" href="https://pdf.wps.com/sr-RS/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="hu-HU" href="https://pdf.wps.com/hu-HU/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="el-GR" href="https://pdf.wps.com/el-GR/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="cs-CZ" href="https://pdf.wps.com/cs-CZ/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="bg-BG" href="https://pdf.wps.com/bg-BG/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="he-IL" href="https://pdf.wps.com/he-IL/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="sv-SE" href="https://pdf.wps.com/sv-SE/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="fi-FI" href="https://pdf.wps.com/fi-FI/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="da-DK" href="https://pdf.wps.com/da-DK/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="sk-SK" href="https://pdf.wps.com/sk-SK/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="hr-HR" href="https://pdf.wps.com/hr-HR/{{section}}/{{toolSlug}}/" />
  <link rel="alternate" hreflang="nb-NO" href="https://pdf.wps.com/nb-NO/{{section}}/{{toolSlug}}/" />

  <!-- ========== 4. Open Graph ========== -->
  <!-- [SHARED] -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="WPS PDF Tools" />
  <!-- [DIFF] localeOg：en_US / zh_Hant / es_ES … -->
  <meta property="og:locale" content="{{localeOg}}" />
  <!-- [DIFF] 可与 title / description 复用，允许略短 -->
  <meta property="og:title" content="{{pageTitle}}" />
  <meta property="og:description" content="{{metaDescription}}" />
  <meta property="og:url" content="{{canonicalUrl}}" />
  <!-- [DIFF] 每工具独立 OG 图，禁止用 favicon -->
  <meta property="og:image" content="{{ogImageUrl}}" />
  <!-- [SHARED] 尺寸固定 1200x630 -->
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- [DIFF] -->
  <meta property="og:image:alt" content="{{ogImageAlt}}" />

  <!-- ========== 5. Twitter Card ========== -->
  <!-- [SHARED] -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@WPS_Office" />
  <!-- [DIFF] 可与 OG 复用 -->
  <meta name="twitter:title" content="{{pageTitle}}" />
  <meta name="twitter:description" content="{{metaDescription}}" />
  <meta name="twitter:image" content="{{ogImageUrl}}" />
  <meta name="twitter:image:alt" content="{{ogImageAlt}}" />

  <!-- ========== 6. Structured Data（GEO 关键）========== -->

  <!-- 6.1 Organization — 全站 [SHARED]，所有工具页相同；可全局组件注入一次 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "WPS Office Corporation",
    "url": "https://pdf.wps.com",
    "logo": "https://pdf.wps.com/img/common/logo-dark.svg",
    "email": "officesupport@wps.com",
    "sameAs": [
      "https://www.wps.com",
      "https://www.facebook.com/WPSOffice",
      "https://twitter.com/WPS_Office",
      "https://www.youtube.com/c/WPSOffice"
    ]
  }
  </script>

  <!-- 6.2 BreadcrumbList — 仅两级：Home › 工具（无 PDF Tools / 3D Conversion 列表页） -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://pdf.wps.com/{{locale}}/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{toolName}}",
        "item": "{{canonicalUrl}}"
      }
    ]
  }
  </script>

  <!-- 6.3 SoftwareApplication — 结构 [SHARED]，内容 [DIFF] -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "{{h1}}",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web, Windows, macOS, Linux, Android, iOS",
    "url": "{{canonicalUrl}}",
    "description": "{{metaDescription}}",
    "inLanguage": "{{locale}}",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "publisher": {
      "@type": "Organization",
      "name": "WPS Office",
      "url": "https://www.wps.com"
    }
  }
  </script>
  <!--
    [SEMI] aggregateRating：
    - 有真实评分数据时再追加
    - 禁止写死虚假 ratingValue / ratingCount
    - 若全站共用同一分数，需产品确认合规后才能 [SHARED]
  -->

  <!-- 6.4 HowTo — 结构 [SHARED]，文案/步骤 [DIFF]；必须与页内可见步骤一致 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HowTo",
    "name": "{{howtoName}}",
    "description": "{{metaDescription}}",
    "inLanguage": "{{locale}}",
    "totalTime": "PT1M",
    "tool": {
      "@type": "HowToTool",
      "name": "{{toolName}}"
    },
    "step": [
      {
        "@type": "HowToStep",
        "position": 1,
        "name": "{{howtoSteps.0.name}}",
        "text": "{{howtoSteps.0.text}}"
      },
      {
        "@type": "HowToStep",
        "position": 2,
        "name": "{{howtoSteps.1.name}}",
        "text": "{{howtoSteps.1.text}}"
      },
      {
        "@type": "HowToStep",
        "position": 3,
        "name": "{{howtoSteps.2.name}}",
        "text": "{{howtoSteps.2.text}}"
      }
    ]
  }
  </script>

  <!-- 6.5 FAQPage — 结构 [SHARED]，Q&A [DIFF]；必须与页内可见 FAQ 一一对应 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "{{faqItems.0.question}}",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "{{faqItems.0.answer}}"
        }
      },
      {
        "@type": "Question",
        "name": "{{faqItems.1.question}}",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "{{faqItems.1.answer}}"
        }
      },
      {
        "@type": "Question",
        "name": "{{faqItems.2.question}}",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "{{faqItems.2.answer}}"
        }
      }
    ]
  }
  </script>

  <!-- 6.6 WebPage — 结构 [SHARED]，字段 [DIFF] -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "@id": "{{canonicalUrl}}#webpage",
    "url": "{{canonicalUrl}}",
    "name": "{{h1}}",
    "description": "{{metaDescription}}",
    "inLanguage": "{{locale}}",
    "isPartOf": {
      "@type": "WebSite",
      "name": "WPS PDF Tools",
      "url": "https://pdf.wps.com"
    },
    "about": {
      "@type": "Thing",
      "name": "{{aboutTopic}}"
    },
    "primaryImageOfPage": {
      "@type": "ImageObject",
      "url": "{{ogImageUrl}}"
    }
  }
  </script>

  <!-- ========== 7. Performance — [SHARED]（可按环境裁剪）========== -->
  <link rel="dns-prefetch" href="https://global-static.wpscdn.com" />
  <!-- 字体 / 关键 API 域名按实际构建产物决定是否 preconnect -->

  <!-- ========== 8. Analytics — [SHARED]（建议 GTM 注入，不按工具拆 head）========== -->
  <!-- GTM / GA4 / Clarity 统一在站点级布局注入 -->

</head>

<!--
================================================================================
研发对接：字段分类速查
--------------------------------------------------------------------------------
【SHARED｜站点级写死 / 全局布局】
  charset, viewport, theme-color, favicon
  robots, author, publisher
  og:type, og:site_name, og:image:width/height
  twitter:card, twitter:site
  Organization JSON-LD
  SoftwareApplication.applicationCategory / operatingSystem / offers / publisher
  HowTo / FAQPage / WebPage / Breadcrumb 的 schema 结构骨架
  hreflang 语言列表与生成规则
  Analytics 容器

【DIFF｜CMS/i18n 按工具+语言配置】
  html[lang], locale, localeOg
  pageTitle, metaDescription, h1, toolName, toolSlug, section
  canonicalUrl（及所有 hreflang href）
  ogImageUrl, ogImageAlt
  aboutTopic
  howtoName, howtoSteps[]
  faqItems[]
  （可选）aggregateRating

【SEMI｜仅 URL 路径，不出现在面包屑】
  section 路径：pdf-tools vs 3d-conversion
  面包屑固定：Home › {toolName}

【一致性硬约束】
  1. <title> / og:title / twitter:title 同源或同源缩短
  2. description / og:description / SoftwareApplication.description / WebPage.description 同源
  3. canonical == og:url == JSON-LD url
  4. HowTo.step ↔ 页内操作步骤文案一致
  5. FAQPage ↔ 页内 FAQ DOM 一一对应（不可 head 有、body 无）
  6. 可见 H1 与 schema name/h1 一致
  7. 旧 URL 301 到新 URL；Sitemap 与 canonical 只用新 URL
================================================================================
-->
