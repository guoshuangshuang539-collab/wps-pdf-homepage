<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting…</title>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var hub = (params.get("hub") || "").toLowerCase();
      var map = {
        mesh: "tools/mesh-converter.html",
        cad: "tools/cad-converter.html",
        bim: "tools/bim-converter.html"
      };
      var target = map[hub] || "tools/convert-pdf.html";
      location.replace(target);
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=tools/convert-pdf.html" />
</head>
<body>
  <p>This demo moved to <a href="tools/convert-pdf.html">Convert PDF</a> (or the matching 3D converter).</p>
</body>
</html>
